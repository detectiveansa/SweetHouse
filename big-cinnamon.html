<div class="card">

    <img src="images/big-cinnamon.jpg" alt="Big Cinnamon">

    <h1>🥮 Big Cinnamon</h1>

    <h2>Price: 60 TL</h2>

    <p>
        Enjoy our delicious Big Cinnamon Roll, freshly baked every day
        with a rich cinnamon filling and delicious topping.
    </p>

    <h3>Ingredients</h3>

    <ul>
        <li>Flour</li>
        <li>Milk</li>
        <li>Eggs</li>
        <li>Cinnamon</li>
        <li>Sugar</li>
        <li>Butter</li>
