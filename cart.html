<!DOCTYPE html>
<html>

<head>
    <title>Shopping Cart</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🛒 Shopping Cart</h1>

<div id="cart-items"></div>

<br>

<button onclick="clearCart()">🗑 Clear Cart</button>

<a href="checkout.html">
    <button>✅ Checkout</button>
</a>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let container = document.getElementById("cart-items");

let grandTotal = 0;

if(cart.length === 0){

    container.innerHTML = "<h2>Your cart is empty.</h2>";

}
else{

    cart.forEach((item,index)=>{

        let itemTotal = item.total || (item.price * item.quantity);

        grandTotal += itemTotal;

        container.innerHTML += `

        <div class="card">

            <h2>${item.name}</h2>

            <p><strong>Flavor:</strong> ${item.flavor}</p>

            <p>

                <strong>Quantity:</strong>

                <button class="quantity-btn"
                onclick="changeQuantity(${index},-1)">➖</button>

                ${item.quantity}

                <button class="quantity-btn"
                onclick="changeQuantity(${index},1)">➕</button>

            </p>

            <p><strong>Price:</strong> ${item.price} TL</p>

            <p><strong>Total:</strong> ${itemTotal} TL</p>

            <button onclick="deleteItem(${index})">
                🗑 Remove
            </button>

        </div>

        <br>

        `;

    });

    container.innerHTML += `

        <hr>

        <h2>Grand Total: ${grandTotal} TL</h2>

    `;

}

function changeQuantity(index,change){

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    cart[index].quantity += change;

    if(cart[index].quantity < 1){

        cart[index].quantity = 1;

    }

    cart[index].total =
        cart[index].price * cart[index].quantity;

    localStorage.setItem("cart",JSON.stringify(cart));

    location.reload();

}

function deleteItem(index){

    cart.splice(index,1);

    localStorage.setItem("cart",JSON.stringify(cart));

    location.reload();

}

function clearCart(){

    localStorage.removeItem("cart");

    location.reload();

}

</script>

</body>

</html>
